<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0e14">
<link rel="icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" rx="22" fill="%230a0e14"/><text x="50" y="68" font-size="52" text-anchor="middle" fill="%23ff8b6a">⌁</text></svg>'>
<title>cuxdeck</title>
<style>
:root{
  --bg:#0a0e14;--bg2:#0d1420;--card:#111826;--card2:#151d2e;--line:#1d2739;
  --fg:#e8edf4;--dim:#7d8b9f;--faint:#4a5568;
  --acc:#ff8b6a;--acc2:#ff6b45;--ok:#34d399;--warn:#fbbf24;--bad:#f87171;--info:#60a5fa;
  --r:18px;--rs:12px;
}
*{box-sizing:border-box;margin:0;-webkit-tap-highlight-color:transparent}
html{height:100%}
body{min-height:100%;background:
  radial-gradient(1200px 500px at 50% -180px,#1a2438 0%,transparent 60%),var(--bg);
  color:var(--fg);font:15px/1.5 -apple-system,BlinkMacSystemFont,"SF Pro Text",system-ui,sans-serif;
  padding-bottom:calc(84px + env(safe-area-inset-bottom));overscroll-behavior-y:contain}
::selection{background:#ff8b6a44}

/* ---------- header ---------- */
header{position:sticky;top:0;z-index:20;
  padding:calc(14px + env(safe-area-inset-top)) 20px 12px;
  background:linear-gradient(180deg,rgba(10,14,20,.96) 70%,rgba(10,14,20,0));
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px)}
.brand{display:flex;align-items:center;gap:9px}
.brand .logo{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;
  background:linear-gradient(135deg,#ff8b6a,#ff5f3d);color:#fff;font-size:17px;font-weight:800;
  box-shadow:0 4px 14px #ff6b4533}
.brand h1{font-size:18px;font-weight:800;letter-spacing:-.3px}
.brand .host{margin-left:auto;display:flex;align-items:center;gap:7px;
  font-size:12.5px;color:var(--dim);font-weight:600}
.pulse{width:8px;height:8px;border-radius:50%;background:var(--ok);
  box-shadow:0 0 0 0 #34d39966;animation:pulse 2.2s infinite}
.pulse.off{background:var(--bad);box-shadow:none;animation:none}
@keyframes pulse{70%{box-shadow:0 0 0 7px transparent}}

/* ---------- layout ---------- */
main{padding:6px 16px 8px;display:flex;flex-direction:column;gap:12px;max-width:520px;margin:0 auto}
.section-label{font-size:11.5px;font-weight:700;letter-spacing:1.4px;color:var(--faint);
  text-transform:uppercase;margin:10px 4px -4px}
.card{background:linear-gradient(180deg,var(--card2),var(--card));
  border:1px solid var(--line);border-radius:var(--r);padding:16px;
  animation:rise .35s cubic-bezier(.2,.8,.3,1) both}
@keyframes rise{from{opacity:0;transform:translateY(8px)}}
.card h3{font-size:15px;font-weight:700;letter-spacing:-.2px}
.sub{color:var(--dim);font-size:12.5px}
.mono{font-family:ui-monospace,"SF Mono",monospace}
.row{display:flex;align-items:center;gap:10px}
.row .grow{flex:1;min-width:0}
.ellip{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ---------- badges & bars ---------- */
.badge{font-size:10.5px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;
  padding:4px 10px;border-radius:99px;white-space:nowrap}
.badge.running{background:#34d39918;color:var(--ok)}
.badge.swapping{background:#60a5fa18;color:var(--info)}
.badge.retrying{background:#f8717118;color:var(--bad)}
.badge.waiting-reset{background:#fbbf2418;color:var(--warn)}
.badge.active{background:#ff8b6a1f;color:var(--acc)}
.bar{height:6px;background:#ffffff0d;border-radius:99px;overflow:hidden}
.bar i{display:block;height:100%;border-radius:99px;background:var(--ok);
  transition:width .8s cubic-bezier(.2,.8,.3,1)}
.bar i.w{background:var(--warn)}.bar i.b{background:var(--bad)}

/* ---------- ring gauge ---------- */
.ring{position:relative;width:64px;height:64px;flex:none}
.ring svg{transform:rotate(-90deg)}
.ring .val{position:absolute;inset:0;display:grid;place-items:center;
  font-size:14px;font-weight:800;letter-spacing:-.5px}
.ring .cap{position:absolute;left:0;right:0;top:100%;text-align:center;
  font-size:10px;color:var(--faint);font-weight:700;letter-spacing:.8px;margin-top:3px}

/* ---------- buttons ---------- */
.btn{border:0;border-radius:13px;font-weight:700;font-size:14px;padding:11px 18px;
  color:#fff;background:linear-gradient(135deg,var(--acc),var(--acc2));
  box-shadow:0 6px 18px #ff6b4529;transition:transform .12s,opacity .12s;cursor:pointer}
.btn:active{transform:scale(.96);opacity:.85}
.btn.ghost{background:#ffffff0a;border:1px solid var(--line);color:var(--fg);box-shadow:none}
.btn.small{padding:8px 13px;font-size:13px;border-radius:11px}
.btn.danger{background:#f8717115;border:1px solid #f8717133;color:var(--bad);box-shadow:none}
.btn:disabled{opacity:.4;pointer-events:none}
.fab{position:fixed;right:18px;bottom:calc(92px + env(safe-area-inset-bottom));z-index:15;
  width:54px;height:54px;border-radius:18px;font-size:26px;line-height:1;padding:0}

/* ---------- bottom nav ---------- */
nav{position:fixed;left:0;right:0;bottom:0;z-index:20;display:flex;
  padding:8px 12px calc(10px + env(safe-area-inset-bottom));
  background:rgba(13,18,28,.9);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  border-top:1px solid var(--line)}
nav button{flex:1;background:none;border:0;color:var(--faint);font-size:10.5px;font-weight:700;
  display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px 0;cursor:pointer;
  transition:color .15s}
nav button svg{width:22px;height:22px;fill:none;stroke:currentColor;stroke-width:1.8;
  stroke-linecap:round;stroke-linejoin:round}
nav button.on{color:var(--acc)}

/* ---------- sheet ---------- */
#veil{position:fixed;inset:0;background:#0009;z-index:30;opacity:0;pointer-events:none;
  transition:opacity .25s}
#veil.show{opacity:1;pointer-events:auto}
#sheet{position:fixed;left:0;right:0;bottom:0;z-index:31;background:var(--bg2);
  border-radius:24px 24px 0 0;border:1px solid var(--line);border-bottom:0;
  padding:14px 20px calc(26px + env(safe-area-inset-bottom));
  transform:translateY(105%);transition:transform .32s cubic-bezier(.2,.8,.25,1)}
#sheet.show{transform:none}
#sheet .grip{width:38px;height:4px;border-radius:99px;background:var(--line);margin:0 auto 14px}
#sheet h2{font-size:17px;font-weight:800;margin-bottom:4px}
#sheet .sheet-sub{color:var(--dim);font-size:13px;margin-bottom:14px}
.field{margin-bottom:12px}
.field label{display:block;font-size:12px;font-weight:700;color:var(--dim);margin-bottom:6px}
.field input{width:100%;background:var(--card);border:1px solid var(--line);color:var(--fg);
  font:500 15px -apple-system,system-ui,sans-serif;padding:13px 14px;border-radius:13px;outline:none}
.field input:focus{border-color:var(--acc)}
.choice{display:flex;align-items:center;gap:12px;padding:13px 6px;border-bottom:1px solid var(--line);
  cursor:pointer}
.choice:last-of-type{border-bottom:0}
.choice .tick{width:24px;height:24px;border-radius:8px;border:1.5px solid var(--faint);flex:none;
  display:grid;place-items:center;color:#fff;font-size:14px;transition:all .15s}
.choice.on .tick{background:var(--acc);border-color:var(--acc)}

/* ---------- toast / skeleton / empty ---------- */
#toast{position:fixed;bottom:calc(96px + env(safe-area-inset-bottom));left:50%;z-index:40;
  transform:translate(-50%,14px);background:#1c2536;border:1px solid var(--line);
  padding:11px 20px;border-radius:14px;font-size:13.5px;font-weight:600;opacity:0;
  transition:all .3s cubic-bezier(.2,.8,.3,1);pointer-events:none;max-width:86vw;text-align:center;
  box-shadow:0 10px 30px #0008}
#toast.show{opacity:1;transform:translate(-50%,0)}
.skel{height:86px;border-radius:var(--r);background:linear-gradient(100deg,var(--card) 40%,var(--card2) 50%,var(--card) 60%);
  background-size:200% 100%;animation:sk 1.4s infinite}
@keyframes sk{to{background-position:-200% 0}}
.empty{text-align:center;padding:44px 24px;color:var(--dim)}
.empty .art{font-size:40px;margin-bottom:10px;opacity:.85}
.empty b{display:block;color:var(--fg);font-size:15.5px;margin-bottom:4px}
.hidden{display:none!important}

/* ---------- pairing ---------- */
#pair{position:fixed;inset:0;z-index:50;background:
  radial-gradient(700px 380px at 50% -100px,#1a2438,transparent 70%),var(--bg);
  display:flex;flex-direction:column;justify-content:center;align-items:center;gap:16px;padding:36px}
#pair .logo{width:64px;height:64px;border-radius:20px;font-size:34px;display:grid;place-items:center;
  background:linear-gradient(135deg,#ff8b6a,#ff5f3d);color:#fff;font-weight:800;
  box-shadow:0 14px 40px #ff6b4540}
#pair h2{font-size:24px;font-weight:800;letter-spacing:-.4px}
#pair p{color:var(--dim);text-align:center;max-width:290px;font-size:14px}
#pair input{background:var(--card);border:1.5px solid var(--line);color:var(--fg);
  font:700 20px ui-monospace,monospace;letter-spacing:5px;text-transform:uppercase;
  padding:14px;border-radius:15px;width:250px;text-align:center;outline:none}
#pair input:focus{border-color:var(--acc)}
#pairErr{color:var(--bad);font-size:13px;min-height:18px}
</style>
</head>
<body>

<div id="pair" class="hidden">
  <div class="logo">⌁</div>
  <h2>cuxdeck</h2>
  <p>Enter the pairing code shown on your computer to link this device. One scan, one device — that's the whole setup.</p>
  <input id="code" placeholder="··········" autocomplete="off" autocapitalize="characters" spellcheck="false">
  <button class="btn" style="width:250px" onclick="pair()">Pair this device</button>
  <div id="pairErr"></div>
</div>

<header>
  <div class="brand">
    <div class="logo">⌁</div><h1>cuxdeck</h1>
    <div class="host"><span class="pulse" id="pulse"></span><span id="host">—</span></div>
  </div>
</header>

<main id="main"></main>

<button id="fab" class="btn fab hidden" onclick="openProjectSheet()">＋</button>

<nav>
  <button id="t-deck" class="on" onclick="tab('deck')">
    <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="13" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
    Deck</button>
  <button id="t-seats" onclick="tab('seats')">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="3.5"/><path d="M5 20c0-3.5 3-6 7-6s7 2.5 7 6"/></svg>
    Seats</button>
  <button id="t-projects" onclick="tab('projects')">
    <svg viewBox="0 0 24 24"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
    Projects</button>
  <button id="t-settings" onclick="tab('settings')">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19 12a7 7 0 0 0-.1-1.2l2-1.5-2-3.4-2.3 1a7 7 0 0 0-2-1.2L14.2 3h-4l-.4 2.7a7 7 0 0 0-2 1.2l-2.3-1-2 3.4 2 1.5a7 7 0 0 0 0 2.4l-2 1.5 2 3.4 2.3-1a7 7 0 0 0 2 1.2l.4 2.7h4l.4-2.7a7 7 0 0 0 2-1.2l2.3 1 2-3.4-2-1.5c.06-.4.1-.8.1-1.2z"/></svg>
    Settings</button>
</nav>

<div id="veil" onclick="closeSheet()"></div>
<div id="sheet"></div>
<div id="toast"></div>

<script>
'use strict';
let TOK=localStorage.getItem('cuxdeck.token')||'';
let CUR='deck', DECK=null, FIRST=true, TICK=null;

const $=id=>document.getElementById(id);
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

function toast(m,ms=2400){const t=$('toast');t.textContent=m;t.classList.add('show');
  clearTimeout(t._h);t._h=setTimeout(()=>t.classList.remove('show'),ms)}

async function api(path,opts={}){
  opts.headers=Object.assign({'Authorization':'Bearer '+TOK,'Content-Type':'application/json'},opts.headers);
  const r=await fetch(path,opts);
  if(r.status===401){showPair();throw new Error('unauthorized')}
  if(!r.ok)throw new Error((await r.json().catch(()=>({}))).error||('HTTP '+r.status));
  return r.json();
}

/* ---------- pairing ---------- */
function showPair(){$('pair').classList.remove('hidden')}
async function pair(){
  const code=$('code').value.trim();if(!code)return;
  $('pairErr').textContent='';
  try{
    const r=await fetch('/api/pair',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({code,name:deviceName()})});
    if(!r.ok)throw 0;
    TOK=(await r.json()).token;localStorage.setItem('cuxdeck.token',TOK);
    $('pair').classList.add('hidden');history.replaceState(null,'',location.pathname);
    toast('Paired — welcome aboard ⌁');refresh();
  }catch{$('pairErr').textContent='Invalid or expired code — generate a fresh one on the computer.'}
}
function deviceName(){
  const ua=navigator.userAgent;
  if(/iPhone/.test(ua))return'iPhone';if(/iPad/.test(ua))return'iPad';
  if(/Android/.test(ua))return'Android';if(/Mac/.test(ua))return'Mac';
  return navigator.platform||'device';
}
(function(){
  const m=location.hash.match(/p=([A-Z0-9]+)/i);
  if(m){$('code').value=m[1].toUpperCase();showPair();pair();}
  else if(!TOK){showPair();}
})();

/* ---------- helpers ---------- */
function ago(iso){const s=Math.max(0,(Date.now()-new Date(iso))/1e3);
  if(s<60)return Math.round(s)+'s';
  if(s<3600)return Math.floor(s/60)+'m '+Math.round(s%60)+'s';
  if(s<86400)return Math.floor(s/3600)+'h '+Math.floor(s%3600/60)+'m';
  return Math.floor(s/86400)+'d '+Math.floor(s%86400/3600)+'h'}
function cls(p){return p>=90?'b':p>=70?'w':''}
function ringColor(p){return p>=90?'var(--bad)':p>=70?'var(--warn)':'var(--ok)'}
function shortDir(d){const p=(d||'').replace(/\/+$/,'').split('/');
  return p.length>2?'…/'+p.slice(-2).join('/'):d}
function cacheKey(a){if(a.uuid&&a.orgUuid)return a.uuid+'|'+a.orgUuid;return a.orgUuid||a.email}
function seatLabel(a){return a.alias||a.email.split('@')[0]}

function ring(pct,cap){
  const p=Math.min(100,Math.max(0,pct??0));
  const R=26,C=2*Math.PI*R,off=C*(1-p/100);
  return `<div class="ring">
    <svg width="64" height="64" viewBox="0 0 64 64">
      <circle cx="32" cy="32" r="${R}" stroke="#ffffff10" stroke-width="6" fill="none"/>
      <circle cx="32" cy="32" r="${R}" stroke="${ringColor(p)}" stroke-width="6" fill="none"
        stroke-linecap="round" stroke-dasharray="${C}" stroke-dashoffset="${off}"
        style="transition:stroke-dashoffset .9s cubic-bezier(.2,.8,.3,1)"/>
    </svg>
    <div class="val">${pct==null?'—':Math.round(p)+'%'}</div>
    <div class="cap">${cap}</div>
  </div>`;
}

/* ---------- tabs & render ---------- */
function tab(t){CUR=t;
  ['deck','seats','projects','settings'].forEach(x=>$('t-'+x).classList.toggle('on',x===t));
  $('fab').classList.toggle('hidden',t!=='projects');
  render();window.scrollTo({top:0})}

function skeletons(){$('main').innerHTML='<div class="skel"></div><div class="skel"></div><div class="skel"></div>'}

function render(){
  if(!DECK){skeletons();return}
  $('host').textContent=DECK.hostname;
  const M=$('main');
  if(CUR==='deck')M.innerHTML=renderDeck();
  if(CUR==='seats')M.innerHTML=renderSeats();
  if(CUR==='projects')M.innerHTML=renderProjects();
  if(CUR==='settings'){renderSettings()}
}

function renderDeck(){
  const ss=DECK.sessions||[];
  const accts=Object.values(DECK.accounts||{});
  const active=accts.find(a=>a.slot===DECK.activeSlot);
  let h='<div class="section-label">Live sessions</div>';
  if(!ss.length){
    h+=`<div class="card empty"><div class="art">🌙</div><b>All quiet</b>
      No cux sessions right now.<br>Start one with <span class="mono">cux</span> on ${esc(DECK.hostname)}.</div>`;
  }else{
    h+=ss.map(s=>{
      const col={'running':'var(--ok)','waiting-reset':'var(--warn)','retrying':'var(--bad)','swapping':'var(--info)'}[s.state]||'var(--dim)';
      return `<div class="card" style="border-left:3px solid ${col}">
        <div class="row">
          <div class="grow">
            <h3 class="ellip">${esc(shortDir(s.cwd))}</h3>
            <div class="sub">seat <b>${esc(s.seat?s.seat.split('@')[0]:'—')}</b>
              · up <span data-tick="${esc(s.startedAt)}">${ago(s.startedAt)}</span></div>
          </div>
          <span class="badge ${esc(s.state)}">${esc(s.state.replace('-',' '))}</span>
        </div>
        ${s.detail?`<div class="sub" style="margin-top:8px;padding-top:8px;border-top:1px solid var(--line)">↻ ${esc(s.detail)}</div>`:''}
      </div>`}).join('');
  }
  h+=`<div class="section-label">This machine</div>
    <div class="card"><div class="row">
      <div class="grow">
        <h3>${esc(DECK.hostname)}</h3>
        <div class="sub">${accts.length} seat${accts.length===1?'':'s'} · active: <b>${active?esc(seatLabel(active)):'—'}</b> · ${esc(DECK.os)}</div>
      </div>
      <button class="btn ghost small" onclick="act('usage-refresh',{},'Refreshing usage…')">↻ refresh</button>
    </div></div>`;
  return h;
}

function renderSeats(){
  const accts=Object.values(DECK.accounts||{}).sort((a,b)=>a.slot-b.slot);
  if(!accts.length)return `<div class="card empty"><div class="art">🪑</div><b>No seats yet</b>
    Log in and run <span class="mono">cux add</span> on the computer.</div>`;
  return '<div class="section-label">Seats</div>'+accts.map(a=>{
    const u=(DECK.usage||{})[cacheKey(a)];
    const f=u?.five_hour?.utilization??null,d7=u?.seven_day?.utilization??null;
    const activeNow=a.slot===DECK.activeSlot;
    return `<div class="card">
      <div class="row" style="margin-bottom:${u?'12px':'0'}">
        <div class="grow">
          <h3 class="ellip">${esc(seatLabel(a))}</h3>
          <div class="sub ellip">${esc(a.email)} · slot ${a.slot}</div>
        </div>
        ${activeNow?'<span class="badge active">active</span>'
          :`<button class="btn ghost small" onclick="confirmSwitch(${a.slot},'${esc(seatLabel(a))}')">switch</button>`}
      </div>
      ${u?`<div class="row" style="gap:22px;justify-content:center;padding:4px 0 14px">
        ${ring(f,'5 HOUR')}${ring(d7,'7 DAY')}
      </div>${u.token_expired?'<div class="sub" style="color:var(--bad);text-align:center">⚠ needs login on the computer</div>':''}`
      :'<div class="sub">no usage data yet — tap refresh on the Deck tab</div>'}
    </div>`}).join('');
}

function renderProjects(){
  const ps=Object.values(DECK.projects||{}).sort((a,b)=>a.name.localeCompare(b.name));
  if(!ps.length)return `<div class="card empty"><div class="art">📁</div><b>No projects</b>
    Projects pin a directory to chosen seats.<br>Tap ＋ to create your first.</div>`;
  return '<div class="section-label">Projects</div>'+ps.map(p=>{
    const seats=(p.slots||[]).map(sl=>{
      const a=(DECK.accounts||{})[sl];
      return `<span class="badge active" style="text-transform:none">${esc(a?seatLabel(a):'#'+sl)}</span>`;
    }).join(' ');
    return `<div class="card">
      <div class="row">
        <div class="grow"><h3>${esc(p.name)}</h3>
          <div class="sub ellip mono" style="font-size:11.5px">${esc(p.dir)}</div></div>
        <button class="btn ghost small" onclick="openSeatSheet('${esc(p.name)}')">seats</button>
      </div>
      <div style="margin-top:10px;display:flex;gap:6px;flex-wrap:wrap;align-items:center">
        ${seats||'<span class="sub">no seats pinned — full pool applies</span>'}
      </div>
    </div>`}).join('');
}

function renderSettings(){
  const M=$('main');
  M.innerHTML=`<div class="section-label">Paired devices</div><div id="devs"><div class="skel"></div></div>
    <div class="section-label">About</div>
    <div class="card">
      <h3>⌁ cuxdeck <span class="sub">${esc(DECK.version)}</span></h3>
      <div class="sub" style="margin-top:6px">Deck <span class="mono">${esc(DECK.deckId)}</span> on ${esc(DECK.hostname)} (${esc(DECK.os)}).
      To watch another machine, install cuxdeck there and scan its QR.</div>
    </div>`;
  api('/api/devices').then(devs=>{
    $('devs').innerHTML=(devs||[]).map(d=>`
      <div class="card"><div class="row">
        <div class="grow"><h3>${esc(d.name)}</h3>
          <div class="sub">paired ${new Date(d.createdAt).toLocaleDateString()} · seen ${ago(d.lastSeen)} ago</div></div>
        <button class="btn danger small" onclick="revoke('${esc(d.id)}','${esc(d.name)}')">revoke</button>
      </div></div>`).join('')||'<div class="card empty">No devices.</div>';
  }).catch(()=>{});
}

/* ---------- sheets ---------- */
function openSheet(html){$('sheet').innerHTML='<div class="grip"></div>'+html;
  $('veil').classList.add('show');$('sheet').classList.add('show')}
function closeSheet(){$('veil').classList.remove('show');$('sheet').classList.remove('show')}

function confirmSwitch(slot,label){
  openSheet(`<h2>Switch to ${esc(label)}?</h2>
    <div class="sheet-sub">Running sessions swap to this seat on their next relaunch; new sessions start on it immediately.</div>
    <div class="row" style="gap:10px">
      <button class="btn ghost" style="flex:1" onclick="closeSheet()">Cancel</button>
      <button class="btn" style="flex:1" onclick="closeSheet();act('switch',{target:'${slot}'},'Switching seat…')">Switch</button>
    </div>`);
}

function openProjectSheet(){
  openSheet(`<h2>New project</h2>
    <div class="sheet-sub">Pin a directory to its own set of seats.</div>
    <div class="field"><label>Name</label>
      <input id="pj-name" placeholder="clientwork" autocapitalize="none" autocomplete="off"></div>
    <div class="field"><label>Directory (absolute path on ${esc(DECK.hostname)})</label>
      <input id="pj-dir" placeholder="/Users/you/code/client" autocapitalize="none" autocomplete="off"></div>
    <button class="btn" style="width:100%" onclick="createProject()">Create project</button>`);
  setTimeout(()=>$('pj-name').focus(),350);
}
function createProject(){
  const name=$('pj-name').value.trim(),dir=$('pj-dir').value.trim();
  if(!name||!dir){toast('Name and directory are required');return}
  closeSheet();act('project-create',{name,dir},'Creating '+name+'…');
}

function openSeatSheet(name){
  const p=(DECK.projects||{})[name];if(!p)return;
  const pinned=new Set(p.slots||[]);
  const accts=Object.values(DECK.accounts||{}).sort((a,b)=>a.slot-b.slot);
  openSheet(`<h2>${esc(name)} seats</h2>
    <div class="sheet-sub">Pinned seats form this project's pool. A seat can serve several projects.</div>
    <div id="seat-list">${accts.map(a=>`
      <div class="choice ${pinned.has(a.slot)?'on':''}" data-slot="${a.slot}" onclick="this.classList.toggle('on')">
        <div class="tick">✓</div>
        <div class="grow"><b>${esc(seatLabel(a))}</b> <span class="sub">${esc(a.email)}</span></div>
      </div>`).join('')}</div>
    <div class="row" style="gap:10px;margin-top:14px">
      <button class="btn danger" onclick="closeSheet();if(confirm('Remove project ${esc(name)}? Accounts stay.'))act('project-remove',{name:'${esc(name)}'},'Removing…')">Remove</button>
      <button class="btn" style="flex:1" onclick="applySeats('${esc(name)}')">Save</button>
    </div>`);
  $('sheet')._pinned=pinned;
}
async function applySeats(name){
  const want=new Set([...document.querySelectorAll('#seat-list .choice.on')].map(e=>+e.dataset.slot));
  const had=$('sheet')._pinned||new Set();
  closeSheet();
  const adds=[...want].filter(s=>!had.has(s)),dels=[...had].filter(s=>!want.has(s));
  if(!adds.length&&!dels.length){toast('No changes');return}
  toast('Saving seats…');
  try{
    for(const s of adds)await api('/api/action',{method:'POST',body:JSON.stringify({action:'project-assign',args:{name,seat:String(s)}})});
    for(const s of dels)await api('/api/action',{method:'POST',body:JSON.stringify({action:'project-unassign',args:{name,seat:String(s)}})});
    toast('Saved ✓');refresh();
  }catch(e){toast('Failed: '+e.message)}
}

function revoke(id,name){
  openSheet(`<h2>Revoke ${esc(name)}?</h2>
    <div class="sheet-sub">That device loses access immediately and must pair again with a fresh code.</div>
    <div class="row" style="gap:10px">
      <button class="btn ghost" style="flex:1" onclick="closeSheet()">Cancel</button>
      <button class="btn danger" style="flex:1" onclick="closeSheet();doRevoke('${esc(id)}')">Revoke</button>
    </div>`);
}
async function doRevoke(id){
  try{await api('/api/devices/revoke',{method:'POST',body:JSON.stringify({id})});
    toast('Device revoked');renderSettings()}catch(e){toast('Failed: '+e.message)}
}

/* ---------- actions & polling ---------- */
async function act(action,args,msg){
  toast(msg||'Working…',6000);
  try{const r=await api('/api/action',{method:'POST',body:JSON.stringify({action,args})});
    toast(r.ok?'Done ✓':('cux: '+(r.output||'error').trim().split('\n').pop()),r.ok?1800:4200);
    refresh();
  }catch(e){toast('Failed: '+e.message,4000)}
}

async function refresh(){
  if(!TOK)return;
  try{
    DECK=await api('/api/deck');
    $('pulse').classList.remove('off');
    if(FIRST||CUR!=='settings')render();
    FIRST=false;
  }catch(e){if(e.message!=='unauthorized')$('pulse').classList.add('off')}
}
skeletons();refresh();setInterval(refresh,4000);
// Live tickers between polls — uptime counts feel alive.
TICK=setInterval(()=>{document.querySelectorAll('[data-tick]').forEach(el=>{
  el.textContent=ago(el.dataset.tick)})},1000);
</script>
</body>
</html>
