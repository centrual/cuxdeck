  radial-gradient(1200px 500px at 50% -180px,#2b190e 0%,transparent 60%),var(--bg);
  color:var(--fg);font:15px/1.5 -apple-system,BlinkMacSystemFont,"SF Pro Text",system-ui,sans-serif;
  padding-bottom:calc(84px + env(safe-area-inset-bottom));overscroll-behavior-y:contain}
::selection{background:#ff8b6a44}

/* ---------- header ---------- */
header{position:sticky;top:0;z-index:20;
  padding:calc(14px + env(safe-area-inset-top)) 20px 12px;
  background:linear-gradient(180deg,rgba(12,10,9,.96) 70%,rgba(12,10,9,0));
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px)}
.brand{display:flex;align-items:center;gap:9px}
.brand .logo{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;
  background:#171210;border:1px solid var(--line);padding:3px}
.brand h1{font-size:18px;font-weight:800;letter-spacing:-.5px}
.cur{color:var(--acc);animation:blink 1.3s steps(1) infinite}
@keyframes blink{50%{opacity:0}}
.brand .host{margin-left:auto;display:flex;align-items:center;gap:7px;
  font-size:12.5px;color:var(--dim);font-weight:600}
.pulse{width:8px;height:8px;border-radius:50%;background:var(--ok);
  box-shadow:0 0 0 0 #34d39966;animation:pulse 2.2s infinite}
.pulse.off{background:var(--bad);box-shadow:none;animation:none}
@keyframes pulse{70%{box-shadow:0 0 0 7px transparent}}

/* ---------- layout ---------- */
main{padding:6px 16px 8px;display:flex;flex-direction:column;gap:12px;max-width:520px;margin:0 auto}
.section-label{font-size:11.5px;font-weight:700;letter-spacing:1.4px;color:var(--faint);
  text-transform:uppercase;margin:10px 4px -4px}
.card{background:linear-gradient(180deg,var(--card2),var(--card));
  border:1px solid var(--line);border-radius:var(--r);padding:16px;
  animation:rise .35s cubic-bezier(.2,.8,.3,1) both}
@keyframes rise{from{opacity:0;transform:translateY(8px)}}
.card h3{font-size:15px;font-weight:700;letter-spacing:-.2px}
.sub{color:var(--dim);font-size:12.5px}
.mono{font-family:ui-monospace,"SF Mono",monospace}
.row{display:flex;align-items:center;gap:10px}
.row .grow{flex:1;min-width:0}
.ellip{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ---------- badges & bars ---------- */
.badge{font-size:10.5px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;
  padding:4px 10px;border-radius:99px;white-space:nowrap}
.badge.running{background:#34d39918;color:var(--ok)}
.badge.swapping{background:#60a5fa18;color:var(--info)}
.badge.retrying{background:#f8717118;color:var(--bad)}
.badge.waiting-reset{background:#fbbf2418;color:var(--warn)}
.badge.active{background:#ff8b6a1f;color:var(--acc)}
.bar{height:6px;background:#ffffff0d;border-radius:99px;overflow:hidden}
.bar i{display:block;height:100%;border-radius:99px;background:var(--ok);
  transition:width .8s cubic-bezier(.2,.8,.3,1)}
.bar i.w{background:var(--warn)}.bar i.b{background:var(--bad)}

/* ---------- ring gauge ---------- */
.ring{position:relative;width:64px;height:64px;flex:none}
.ring svg{transform:rotate(-90deg)}
.ring .val{position:absolute;inset:0;display:grid;place-items:center;
  font-size:14px;font-weight:800;letter-spacing:-.5px}
.ring .cap{position:absolute;left:0;right:0;top:100%;text-align:center;
  font-size:10px;color:var(--faint);font-weight:700;letter-spacing:.8px;margin-top:3px}

/* ---------- buttons ---------- */
.btn{border:0;border-radius:13px;font-weight:700;font-size:14px;padding:11px 18px;
  color:#fff;background:linear-gradient(135deg,var(--acc),var(--acc2));
  box-shadow:0 6px 18px #f0662f30;transition:transform .12s,opacity .12s;cursor:pointer}
.btn:active{transform:scale(.96);opacity:.85}
.btn.ghost{background:#ffffff0a;border:1px solid var(--line);color:var(--fg);box-shadow:none}
.btn.small{padding:8px 13px;font-size:13px;border-radius:11px}
.btn.danger{background:#f8717115;border:1px solid #f8717133;color:var(--bad);box-shadow:none}
.btn:disabled{opacity:.4;pointer-events:none}
.fab{position:fixed;right:18px;bottom:calc(92px + env(safe-area-inset-bottom));z-index:15;
  width:54px;height:54px;border-radius:18px;font-size:26px;line-height:1;padding:0}

/* ---------- bottom nav ---------- */
nav{position:fixed;left:0;right:0;bottom:0;z-index:20;display:flex;
  padding:8px 12px calc(10px + env(safe-area-inset-bottom));
  background:rgba(17,13,11,.9);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  border-top:1px solid var(--line)}
nav button{flex:1;background:none;border:0;color:var(--faint);font-size:10.5px;font-weight:700;
  display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px 0;cursor:pointer;
  transition:color .15s}
nav button svg{width:22px;height:22px;fill:none;stroke:currentColor;stroke-width:1.8;
  stroke-linecap:round;stroke-linejoin:round}
nav button.on{color:var(--acc)}

/* ---------- sheet ---------- */
#veil{position:fixed;inset:0;background:#0009;z-index:30;opacity:0;pointer-events:none;
  transition:opacity .25s}
#veil.show{opacity:1;pointer-events:auto}
#sheet{position:fixed;left:0;right:0;bottom:0;z-index:31;background:var(--bg2);
  border-radius:24px 24px 0 0;border:1px solid var(--line);border-bottom:0;
  padding:14px 20px calc(26px + env(safe-area-inset-bottom));
  transform:translateY(105%);transition:transform .32s cubic-bezier(.2,.8,.25,1)}
#sheet.show{transform:none}
#sheet .grip{width:38px;height:4px;border-radius:99px;background:var(--line);margin:0 auto 14px}
#sheet h2{font-size:17px;font-weight:800;margin-bottom:4px}
#sheet .sheet-sub{color:var(--dim);font-size:13px;margin-bottom:14px}
.field{margin-bottom:12px}
.field label{display:block;font-size:12px;font-weight:700;color:var(--dim);margin-bottom:6px}
.field input{width:100%;background:var(--card);border:1px solid var(--line);color:var(--fg);
  font:500 15px -apple-system,system-ui,sans-serif;padding:13px 14px;border-radius:13px;outline:none}
.field input:focus{border-color:var(--acc)}
.choice{display:flex;align-items:center;gap:12px;padding:13px 6px;border-bottom:1px solid var(--line);
  cursor:pointer}
.choice:last-of-type{border-bottom:0}
.choice .tick{width:24px;height:24px;border-radius:8px;border:1.5px solid var(--faint);flex:none;
  display:grid;place-items:center;color:#fff;font-size:14px;transition:all .15s}
.choice.on .tick{background:var(--acc);border-color:var(--acc)}

/* ---------- toast / skeleton / empty ---------- */
#toast{position:fixed;bottom:calc(96px + env(safe-area-inset-bottom));left:50%;z-index:40;
  transform:translate(-50%,14px);background:#241b15;border:1px solid var(--line);
  padding:11px 20px;border-radius:14px;font-size:13.5px;font-weight:600;opacity:0;
  transition:all .3s cubic-bezier(.2,.8,.3,1);pointer-events:none;max-width:86vw;text-align:center;
  box-shadow:0 10px 30px #0008}
#toast.show{opacity:1;transform:translate(-50%,0)}
.skel{height:86px;border-radius:var(--r);background:linear-gradient(100deg,var(--card) 40%,var(--card2) 50%,var(--card) 60%);
  background-size:200% 100%;animation:sk 1.4s infinite}
@keyframes sk{to{background-position:-200% 0}}
.empty{text-align:center;padding:44px 24px;color:var(--dim)}
.empty .art{font-size:40px;margin-bottom:10px;opacity:.85}
.empty b{display:block;color:var(--fg);font-size:15.5px;margin-bottom:4px}
.hidden{display:none!important}
.tappable{cursor:pointer}
.tappable:active{transform:scale(.99)}

/* ---------- chat view — faithful to Claude Code's own rendering ---------- */
#chat{position:fixed;inset:0;z-index:45;background:var(--bg);display:flex;flex-direction:column;
  transform:translateX(100%);transition:transform .3s cubic-bezier(.2,.8,.25,1)}
#chat.show{transform:none}
#chat .chead{display:flex;align-items:center;gap:10px;
  padding:calc(12px + env(safe-area-inset-top)) 16px 12px;
  border-bottom:1px solid var(--line);background:var(--bg2)}
#chat .chead .back{font-size:26px;background:none;border:0;color:var(--acc);cursor:pointer;padding:0 4px 0 0;line-height:1}
#chat .chead .grow{min-width:0}
#chat .chead h2{font-size:15px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#chat .chead .sub{font-size:12px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
#clog{flex:1;overflow-y:auto;padding:14px 14px calc(20px + env(safe-area-inset-bottom));
  -webkit-overflow-scrolling:touch;overscroll-behavior:contain;
  font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12.5px;line-height:1.6;
  color:var(--fg)}
body.chat-open{overflow:hidden;position:fixed;inset:0;width:100%}
/* user turn: the CLI's dark full-width bar with a prompt marker */
.uline{background:color-mix(in srgb,var(--fg) 9%,var(--bg));border-radius:6px;
  padding:8px 11px;margin:14px 0 8px;white-space:pre-wrap;word-break:break-word;
  display:flex;gap:8px;animation:rise .25s both}
.uline .pfx{color:var(--dim);flex:none;user-select:none}
.uline .chip{font-size:10px;color:var(--faint);display:block;margin-top:5px}
/* assistant text: plain flowing document, markdown rendered */
.aline{padding:3px 1px;margin:4px 0;word-break:break-word;animation:rise .25s both}
.aline p{margin:0 0 9px}.aline p:last-child{margin:0}
.aline code{background:rgba(128,128,128,.22);border-radius:4px;padding:1px 5px;font-size:.92em}
.aline pre{background:var(--bg2);border:1px solid var(--line);border-radius:8px;padding:9px 11px;
  overflow-x:auto;margin:8px 0}
.aline pre code{background:none;padding:0;white-space:pre}
.aline ul,.aline ol{margin:0 0 9px;padding-left:22px}
.aline li{margin:2px 0}
.aline h1,.aline h2,.aline h3,.aline h4{font-size:1em;margin:10px 0 6px;color:var(--acc)}
.aline a{color:var(--acc);text-decoration:none;border-bottom:1px solid color-mix(in srgb,var(--acc) 40%,transparent)}
.aline b{font-weight:800}
.aline blockquote{margin:6px 0;padding:2px 10px;border-left:3px solid var(--line);color:var(--dim)}
/* tool call: "⏺ Bash(cmd…)" with its "⎿ result" beneath */
.tline{padding:5px 1px 0;word-break:break-word}
.tline .trow{display:flex;gap:7px;align-items:baseline}
.tline.has-full .trow{cursor:pointer}
.tline .dot{color:var(--ok);flex:none}
.tline.pending .dot{color:var(--dim)}
.tline .tname{font-weight:700;white-space:nowrap;flex:none}
.tline .targ{color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.tres{display:flex;gap:7px;align-items:baseline;padding:0 1px 2px;color:var(--dim)}
.tres .elb{color:var(--faint);flex:none;padding-left:3px}
.tres .rsum{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.tres .more{color:var(--faint);flex:none;font-size:11px}
.tres.err,.tres.err .rsum{color:var(--bad)}
.tres.has-full{cursor:pointer}
.tfull{display:none;font-size:11.5px;color:var(--dim);background:var(--bg2);
  border:1px solid var(--line);border-radius:8px;padding:8px 10px;margin:4px 0 6px 18px;
  white-space:pre-wrap;word-break:break-word;max-height:44vh;overflow-y:auto;overscroll-behavior:contain}
.open>.tfull{display:block}
/* thinking: one dim italic line, tap to unfold */
.think{color:var(--faint);font-style:italic;padding:4px 1px;cursor:pointer;word-break:break-word}
.think .tprev{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block}
.think .tbody{display:none;white-space:pre-wrap;margin-top:4px}
.think.open .tprev{display:none}
.think.open .tbody{display:block}
/* dividers, commands, status */
.cdiv{color:var(--faint);font-size:11px;padding:8px 1px;letter-spacing:.4px}
.cdiv.command{background:color-mix(in srgb,var(--fg) 9%,var(--bg));border-radius:6px;
  color:var(--dim);padding:7px 11px;margin:12px 0 4px}
.worked{color:var(--faint);font-size:11.5px;padding:8px 1px 2px}
.cdenied{color:var(--bad);padding:0 1px 2px;display:flex;gap:7px}
.cask{background:var(--card);border:1px solid var(--line);border-radius:10px;
  padding:10px 13px;margin:8px 0;font-size:12.5px}
.cask .qhead{font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--acc);margin-bottom:4px}
.cask .qopts{margin-top:6px;font-size:11px;color:var(--faint)}
.cask.answer{border-color:color-mix(in srgb,var(--acc) 45%,transparent)}
.cstat{color:var(--acc);padding:10px 1px;display:flex;align-items:center;gap:8px;font-size:12.5px}
.cstat .spin{animation:spinstar 1.6s linear infinite;display:inline-block}
@keyframes spinstar{0%{opacity:1}50%{opacity:.35}100%{opacity:1}}
.cstat .sdetail{color:var(--faint)}
.readonly{color:var(--faint);font-size:11px;background:var(--card);border:1px solid var(--line);
  border-radius:99px;padding:6px 12px;margin:0 auto 10px;width:fit-content}
#ctasks{display:none;border-bottom:1px solid var(--line);background:var(--bg2);
  padding:8px 16px;font-size:12px;flex:none;max-height:38vh;overflow-y:auto;overscroll-behavior:contain;
  font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
#ctasks.show{display:block}
#ctasks .thead{display:flex;align-items:center;gap:8px;cursor:pointer;font-weight:700;color:var(--fg)}
#ctasks .thead .prog{color:var(--faint);font-weight:400}
#ctasks .tlist{display:none;margin-top:7px}
#ctasks.open .tlist{display:block}
#ctasks .titem{display:flex;gap:8px;padding:3px 0;color:var(--dim);align-items:baseline}
#ctasks .titem .mark{flex:none;width:16px;text-align:center}
#ctasks .titem.completed{color:var(--faint);text-decoration:line-through}
#ctasks .titem.in_progress{color:var(--fg);font-weight:600}
#ctasks .titem.in_progress .mark{color:var(--acc)}

/* ---------- pairing ---------- */
#pair{position:fixed;inset:0;z-index:50;background:
  radial-gradient(700px 380px at 50% -100px,#2b190e,transparent 70%),var(--bg);
  display:flex;flex-direction:column;justify-content:center;align-items:center;gap:16px;padding:36px}
#pair .logo{width:64px;height:64px;border-radius:20px;font-size:34px;display:grid;place-items:center;
  background:#171210;border:1px solid var(--line);padding:10px;box-shadow:0 14px 40px #f0662f2e}
#pair h2{font-size:24px;font-weight:800;letter-spacing:-.4px}
#pair p{color:var(--dim);text-align:center;max-width:290px;font-size:14px}
#pair input{background:var(--card);border:1.5px solid var(--line);color:var(--fg);
  font:700 20px ui-monospace,monospace;letter-spacing:5px;text-transform:uppercase;
  padding:14px;border-radius:15px;width:250px;text-align:center;outline:none}
#pair input:focus{border-color:var(--acc)}
#pairErr{color:var(--bad);font-size:13px;min-height:18px}
</style>
</head>

<script>
'use strict';
let TOK=localStorage.getItem('cuxdeck.token')||'';
let CUR='deck', DECK=null, CONVS=[], FIRST=true, TICK=null;

const $=id=>document.getElementById(id);
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

function toast(m,ms=2400){const t=$('toast');t.textContent=m;t.classList.add('show');
  clearTimeout(t._h);t._h=setTimeout(()=>t.classList.remove('show'),ms)}

async function api(path,opts={}){
  opts.headers=Object.assign({'Authorization':'Bearer '+TOK,'Content-Type':'application/json'},opts.headers);
  const r=await fetch(path,opts);
  if(r.status===401){showPair();throw new Error('unauthorized')}
  if(!r.ok)throw new Error((await r.json().catch(()=>({}))).error||('HTTP '+r.status));
  return r.json();
}

/* ---------- pairing ---------- */
function showPair(){$('pair').classList.remove('hidden')}
async function pair(){
  const code=$('code').value.trim();if(!code)return;
  $('pairErr').textContent='';
  try{
    const r=await fetch('/api/pair',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({code,name:deviceName()})});
    if(!r.ok)throw 0;
    TOK=(await r.json()).token;localStorage.setItem('cuxdeck.token',TOK);
    $('pair').classList.add('hidden');history.replaceState(null,'',location.pathname);
    toast('Paired — welcome aboard ⌁');refresh();
  }catch{$('pairErr').textContent='Invalid or expired code — generate a fresh one on the computer.'}
}
function deviceName(){
  const ua=navigator.userAgent;
  if(/iPhone/.test(ua))return'iPhone';if(/iPad/.test(ua))return'iPad';
  if(/Android/.test(ua))return'Android';if(/Mac/.test(ua))return'Mac';
  return navigator.platform||'device';
}
(function(){
  const m=location.hash.match(/p=([A-Z0-9]+)/i);
  if(m){$('code').value=m[1].toUpperCase();showPair();pair();}
  else if(!TOK){showPair();}
})();

/* ---------- helpers ---------- */
function ago(iso){const s=Math.max(0,(Date.now()-new Date(iso))/1e3);
  if(s<60)return Math.round(s)+'s';
  if(s<3600)return Math.floor(s/60)+'m '+Math.round(s%60)+'s';
  if(s<86400)return Math.floor(s/3600)+'h '+Math.floor(s%3600/60)+'m';
  return Math.floor(s/86400)+'d '+Math.floor(s%86400/3600)+'h'}
function cls(p){return p>=90?'b':p>=70?'w':''}
function ringColor(p){return p>=90?'var(--bad)':p>=70?'var(--warn)':'var(--ok)'}
function shortDir(d){const p=(d||'').replace(/\/+$/,'').split('/');
  return p.length>2?'…/'+p.slice(-2).join('/'):d}
function inTime(iso){const s=(new Date(iso)-Date.now())/1e3;
  if(s<=0)return'now';if(s<3600)return Math.ceil(s/60)+'m';
  if(s<86400)return Math.floor(s/3600)+'h '+Math.round(s%3600/60)+'m';
  return Math.floor(s/86400)+'d'}
// Dolu ya da dolmaya yakın pencere için "ne zaman boşalıyor" satırı.
function resetLine(u){
  const rows=[];
  for(const [w,label] of [[u.five_hour,'5h'],[u.seven_day,'7d']]){
    if(w&&w.utilization>=90&&w.resets_at)
      rows.push(label+' window frees in <b>'+inTime(w.resets_at)+'</b>');
  }
  return rows.length?'<div class="sub" style="text-align:center;margin-top:6px;padding-bottom:4px">⏳ '+rows.join(' · ')+'</div>':'';
}
function cacheKey(a){if(a.uuid&&a.orgUuid)return a.uuid+'|'+a.orgUuid;return a.orgUuid||a.email}
function seatLabel(a){return a.alias||a.email.split('@')[0]}

function ring(pct,cap){
  const p=Math.min(100,Math.max(0,pct??0));
  const R=26,C=2*Math.PI*R,off=C*(1-p/100);
  return `<div class="ring">
    <svg width="64" height="64" viewBox="0 0 64 64">
      <circle cx="32" cy="32" r="${R}" stroke="#ffffff10" stroke-width="6" fill="none"/>
      <circle cx="32" cy="32" r="${R}" stroke="${ringColor(p)}" stroke-width="6" fill="none"
        stroke-linecap="round" stroke-dasharray="${C}" stroke-dashoffset="${off}"
        style="transition:stroke-dashoffset .9s cubic-bezier(.2,.8,.3,1)"/>
    </svg>
    <div class="val">${pct==null?'—':Math.round(p)+'%'}</div>
    <div class="cap">${cap}</div>
  </div>`;
}

      return `<div class="card tappable" style="border-left:3px solid ${col}"

          </div>
          <span class="badge ${esc(s.state)}">${esc(s.state.replace('-',' '))}</span>
        </div>
        ${s.detail?`<div class="sub" style="margin-top:8px;padding-top:8px;border-top:1px solid var(--line)">↻ ${esc(s.detail)}</div>`:''}
        <div class="sub" style="margin-top:8px;color:var(--acc);font-weight:700">open conversation ›</div>
      </div>`}).join('');
  }

  if(!cs.length){
    h+=`<div class="card empty"><div class="art">💬</div><b>No conversations yet</b>
      Claude Code transcripts on this machine appear here.</div>`;
  }else{
    h+=cs.map(c=>{
      const when=c.active?'<span style="color:var(--ok);font-weight:700">● live</span>':esc(ago(c.updatedAt))+' ago';
      return `<div class="card tappable" style="border-left:3px solid ${c.active?'var(--ok)':'var(--line)'}"

  return '<div class="section-label">Seats</div>'+accts.map(a=>{
    const u=(DECK.usage||{})[cacheKey(a)];
    const f=u?.five_hour?.utilization??null,d7=u?.seven_day?.utilization??null;

async function applySeats(name){
  const want=new Set([...document.querySelectorAll('#seat-list .choice.on')].map(e=>+e.dataset.slot));
  const had=$('sheet')._pinned||new Set();
  closeSheet();
  const adds=[...want].filter(s=>!had.has(s)),dels=[...had].filter(s=>!want.has(s));
  if(!adds.length&&!dels.length){toast('No changes');return}
  toast('Saving seats…');
  try{
    for(const s of adds)await api('/api/action',{method:'POST',body:JSON.stringify({action:'project-assign',args:{name,seat:String(s)}})});
    for(const s of dels)await api('/api/action',{method:'POST',body:JSON.stringify({action:'project-unassign',args:{name,seat:String(s)}})});
    toast('Saved ✓');refresh();
  }catch(e){toast('Failed: '+e.message)}
}

/* ---------- chat view (read-only conversation) ---------- */
let CHAT_ES=null,CHAT_TICK=null,CHAT_ST=null,CHAT_SCROLL=0;
function openChat(pid,title,seat){
  openStream('/api/session/'+pid+'/chat','seat '+seat,title);
}
function openConv(id,title){
  openStream('/api/conversation/'+id+'/chat','',title);
}
function openStream(url,subPrefix,title){
  $('chat-title').textContent=title;
  $('chat-sub').textContent='loading history…';
  const log=$('clog');log.innerHTML='';
  $('chat').classList.add('show');
  let atBottom=true;
  log.onscroll=()=>{atBottom=log.scrollHeight-log.scrollTop-log.clientHeight<80};
  const stick=()=>{if(atBottom)log.scrollTop=log.scrollHeight};
  if(CHAT_ES)CHAT_ES.close();
  if(CHAT_TICK)clearInterval(CHAT_TICK);
  const ro=document.createElement('div');ro.className='readonly';
  ro.textContent='👁 read-only — sending comes next';
  log.appendChild(ro);
  // Lock the page behind the overlay so inner and outer scrolling never
  // fight — restored (with scroll position) on close.
  CHAT_SCROLL=window.scrollY;document.body.classList.add('chat-open');
  const tk=$('ctasks');tk.classList.remove('show','open');tk.innerHTML='';
  // Status model: what the session is doing right now, derived from the
  // event stream the same way Claude Code's own status line is.
  CHAT_ST={caughtUp:false,lastTs:0,last:null,turnStart:0,turnTokens:0,lastAssistTs:0,
    prefix:subPrefix,tasks:new Map(),todos:null,snap:false,queued:new Map(),
    toolEls:new Map(),pillEl:null};
  // EventSource can't set headers, so the token rides the query string
  // over the already-TLS'd tunnel; the endpoint accepts either form.
  CHAT_ES=new EventSource(url+'?token='+encodeURIComponent(TOK));
  let liveMark=null,gotAny=false;
  // A reconnect replays the whole transcript; start the render over so
  // nothing shows up twice.
  CHAT_ES.onopen=()=>{if(gotAny){
    log.innerHTML='';log.appendChild(ro);liveMark=null;gotAny=false;
    Object.assign(CHAT_ST,{caughtUp:false,tasks:new Map(),todos:null,turnTokens:0,snap:false,queued:new Map(),toolEls:new Map(),pillEl:null,turnStart:0,lastAssistTs:0});
    $('ctasks').classList.remove('show');
  }};
  CHAT_ES.onmessage=e=>{try{const ev=JSON.parse(e.data);
    gotAny=true;
    const n=renderEvent(ev); // render first: turn boundaries need pre-update state
    trackStatus(ev);
    if(n){
      if(ev.role==='system'&&ev.kind==='caught-up'){
        if(liveMark)liveMark.remove(); // only ever one live pill
        liveMark=n;CHAT_ST.pillEl=n;
      }
      log.appendChild(n);
      if(liveMark&&n!==liveMark)log.appendChild(liveMark); // pinned to the tail
    }
    stick()}catch{}};
  CHAT_ES.onerror=()=>{};
  CHAT_TICK=setInterval(renderStatus,1000);
}
function closeChat(){$('chat').classList.remove('show');
  document.body.classList.remove('chat-open');window.scrollTo(0,CHAT_SCROLL||0);
  if(CHAT_ES){CHAT_ES.close();CHAT_ES=null}
  if(CHAT_TICK){clearInterval(CHAT_TICK);CHAT_TICK=null}}

function trackStatus(ev){
  const st=CHAT_ST;if(!st)return;
  if(ev.role==='system'&&ev.kind==='caught-up'){st.caughtUp=true;renderStatus();renderTasks();return}
  if(ev.ts){st.lastTs=Date.parse(ev.ts)||st.lastTs}
  st.last=ev;
  // only a real turn-opening prompt resets the turn — not queued copies
  // or mid-turn injections
  if(ev.role==='user'&&ev.kind==='text'&&!ev.detail){st.turnStart=st.lastTs;st.turnTokens=0}
  if(ev.role==='assistant'||ev.role==='tool'||ev.role==='result')st.lastAssistTs=st.lastTs;
  if(ev.tokens)st.turnTokens+=ev.tokens;
  if(st.caughtUp)renderStatus();
}
function fmtDur(ms){
  const s=Math.max(0,Math.floor(ms/1000));
  if(s<60)return s+'s';
  if(s<3600)return Math.floor(s/60)+'m '+(s%60)+'s';
  return Math.floor(s/3600)+'h '+Math.floor(s%3600/60)+'m';
}
function fmtTok(n){return n>=1000?(n/1000).toFixed(1)+'k':''+n}
function renderStatus(){
  const st=CHAT_ST;if(!st)return;
  const el=$('chat-sub');
  if(!st.caughtUp){el.textContent='loading history…';return}
  const pre=st.prefix?st.prefix+' · ':'';
  const nq=[...st.queued.values()].filter(e=>e&&e.st==='pending').length;
  const qsuf=nq?' · ⏳ '+nq+' queued':'';
  let line,busy=false;
  if(!st.last||!st.lastTs){line='live'}
  else{
    const idle=Date.now()-st.lastTs;
    const turn=st.turnStart?fmtDur(Date.now()-st.turnStart):'';
    const tok=st.turnTokens?' · ↓ '+fmtTok(st.turnTokens)+' tokens':'';
    if(idle>150000){ // no writes for 2.5 min — the session is idle
      line='Idle · last activity '+fmtDur(idle)+' ago';
    }else if(st.last.role==='tool'||st.last.role==='result'){
      const name=((st.last.role==='tool'?st.last.tool:st.last.text)||'tool').split('__').pop();
      const run=st.last.role==='tool'?'Running '+name+'… ('+fmtDur(idle):'Working… ('+fmtDur(idle);
      line=run+(turn?' · turn '+turn:'')+tok+')';busy=true;
    }else if(st.last.role==='user'){
      line='Thinking… ('+fmtDur(idle)+tok+')';busy=true;
    }else{
      line='Working… ('+(turn||fmtDur(idle))+tok+')';busy=true;
    }
  }
  el.textContent=pre+(busy?'✳ ':'')+line+qsuf;
  if(st.pillEl){
    st.pillEl.innerHTML=busy
      ?'<span class="spin">✳</span> '+esc(line)+' <span class="sdetail">· live</span>'
      :'<span class="pulse"></span><span class="sdetail">'+esc(line)+' — watching for new messages</span>';
  }
}

/* Minimal, safe markdown: escape first, then only our own tags get in. */
function md(src){
  const inline=s=>esc(s)
    .replace(/`([^`]+)`/g,'<code>$1</code>')
    .replace(/\*\*([^*]+)\*\*/g,'<b>$1</b>')
    .replace(/\[([^\]]+)\]\((https?:[^)\s]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>')
    .replace(/(^|[\s(])(https?:\/\/[^\s<)]+)/g,'$1<a href="$2" target="_blank" rel="noopener">$2</a>');
  const parts=String(src).split('```');let html='';
  for(let i=0;i<parts.length;i++){
    if(i%2===1){ // fenced code — first line may be a language tag
      let body=parts[i];const nl=body.indexOf('\n');
      if(nl>=0&&/^[\w+-]*\s*$/.test(body.slice(0,nl)))body=body.slice(nl+1);
      html+='<pre><code>'+esc(body.replace(/\n+$/,''))+'</code></pre>';continue;
    }
    let out=[],list=null;
    const flush=()=>{if(list){out.push('<'+list.tag+'>'+list.items.map(x=>'<li>'+x+'</li>').join('')+'</'+list.tag+'>');list=null}};
    for(const raw of parts[i].split('\n')){
      const t=raw.trim();let m;
      if(m=t.match(/^(#{1,4})\s+(.*)/)){flush();out.push('<h'+m[1].length+'>'+inline(m[2])+'</h'+m[1].length+'>')}
      else if(m=t.match(/^[-*•]\s+(.*)/)){if(!list||list.tag!=='ul'){flush();list={tag:'ul',items:[]}}list.items.push(inline(m[1]))}
      else if(m=t.match(/^\d+[.)]\s+(.*)/)){if(!list||list.tag!=='ol'){flush();list={tag:'ol',items:[]}}list.items.push(inline(m[1]))}
      else if(m=t.match(/^>\s?(.*)/)){flush();out.push('<blockquote>'+inline(m[1])+'</blockquote>')}
      else if(t===''){flush();out.push('')}
      else{flush();out.push(inline(raw))}
    }
    flush();
    html+=out.join('\n').split(/\n{2,}/).filter(x=>x.trim()).map(x=>
      /^\s*<(h\d|ul|ol|blockquote|pre)/.test(x)?x:'<p>'+x.trim().replace(/\n/g,'<br>')+'</p>').join('');
  }
  return html;
}
function firstln(s){s=String(s).trim();const i=s.indexOf('\n');if(i>=0)s=s.slice(0,i);return s.length>90?s.slice(0,90)+'…':s}

function toggleFull(fullEl){fullEl.style.display=fullEl.style.display==='block'?'none':'block'}

function renderEvent(ev){
  const st=CHAT_ST;
  if(ev.role==='task'){updateTasks(ev);return null}

  if(ev.role==='ask'){
    const d=document.createElement('div');
    d.className='cask'+(ev.kind==='answer'?' answer':'');
    if(ev.kind==='question'){
      d.innerHTML=(ev.tool?'<div class="qhead">'+esc(ev.tool)+'</div>':'<div class="qhead">question</div>')
        +md(ev.text)+(ev.detail?'<div class="qopts">◦ '+esc(ev.detail)+'</div>':'');
    }else{d.innerHTML='<div class="qhead">answered</div>'+esc(ev.text)}
    return d;
  }

  if(ev.role==='user'&&ev.kind==='text'){
    if(ev.detail!=='queued'&&markDelivered(ev.text))return null;
    const frag=document.createDocumentFragment();
    // close the previous turn the way the CLI does
    if(st&&!ev.detail&&st.turnStart&&st.lastAssistTs>st.turnStart){
      const wk=document.createElement('div');wk.className='worked';
      wk.textContent='✳ Worked for '+fmtDur(st.lastAssistTs-st.turnStart);
      frag.appendChild(wk);
    }
    const d=document.createElement('div');d.className='uline';
    const chip=ev.detail==='queued'?'⏳ queued — waiting for Claude'
      :ev.detail==='sent mid-turn'?'⏱ sent mid-turn':'';
    d.innerHTML='<span class="pfx">❯</span><span style="min-width:0">'+esc(ev.text)
      +(chip?'<span class="chip">'+chip+'</span>':'')+'</span>';
    if(ev.detail==='queued'&&st){st.queued.set(ev.text,{el:d,st:'pending'});renderStatus()}
    frag.appendChild(d);
    return frag;
  }

  if(ev.role==='user'&&ev.kind==='image'){
    const d=document.createElement('div');d.className='uline';
    d.innerHTML='<span class="pfx">❯</span><span>[Image]</span>';return d;
  }

  if(ev.role==='assistant'){
    const d=document.createElement('div');
    if(ev.kind==='thinking'){
      d.className='think';
      d.innerHTML='<span class="tprev">✻ Thinking… '+esc(firstln(ev.text))+'</span><span class="tbody">✻ '+esc(ev.text)+'</span>';
      d.onclick=()=>d.classList.toggle('open');
      return d;
    }
    if(ev.kind==='image'){d.className='aline';d.textContent='[Image]';return d}
    d.className='aline';d.innerHTML=md(ev.text);
    return d;
  }

  if(ev.role==='tool'){
    const d=document.createElement('div');
    d.className='tline pending'+(ev.full?' has-full':'');
    const arg=ev.detail?'('+ev.detail+')':'';
    d.innerHTML='<div class="trow"><span class="dot">⏺</span>'
      +'<span class="tname">'+esc((ev.text||'').replace(/^\S+\s/,''))+'</span>'
      +'<span class="targ">'+esc(arg)+'</span></div>'
      +(ev.full?'<div class="tfull">'+esc(ev.full)+'</div>':'');
    if(ev.full){const f=d.querySelector('.tfull');d.querySelector('.trow').onclick=()=>toggleFull(f)}
    if(st&&ev.id)st.toolEls.set(ev.id,d);
    return d;
  }

  if(ev.role==='result'){
    // "⎿ summary" attaches under its call; standalone if the call is
    // not in view (never emitted, or a shape we didn't track).
    const row=document.createElement('div');
    row.className='tres'+(ev.kind==='error'||ev.kind==='denied'?' err':'')+(ev.full?' has-full':'');
    row.innerHTML='<span class="elb">⎿</span><span class="rsum">'+esc(ev.text)+'</span>'
      +(ev.detail?'<span class="more">'+esc(ev.detail)+'</span>':'');
    let full=null;
    if(ev.full){full=document.createElement('div');full.className='tfull';full.textContent=ev.full;
      row.onclick=()=>toggleFull(full)}
    const tl=st&&ev.id?st.toolEls.get(ev.id):null;
    if(tl){
      tl.classList.remove('pending');
      if(ev.kind==='error'||ev.kind==='denied')tl.querySelector('.dot').style.color='var(--bad)';
      tl.appendChild(row);if(full)tl.appendChild(full);
      return null; // inserted in place under the call
    }
    if(full){const wrap=document.createElement('div');wrap.appendChild(row);wrap.appendChild(full);return wrap}
    return row;
  }

  if(ev.role==='divider'){
    const d=document.createElement('div');
    if(ev.kind==='command'){markDelivered(ev.text);d.className='cdiv command';
      d.innerHTML='<span style="color:var(--faint)">❯</span> '+esc(ev.text);return d}
    if(ev.kind==='interrupt'){d.className='cdiv';d.textContent='⎿ Interrupted · user sent a new instruction';return d}
    d.className='cdiv';d.textContent='⏵ '+(ev.detail||ev.text);return d;
  }

  if(ev.role==='system'&&ev.kind==='caught-up'){
    const d=document.createElement('div');d.className='cstat';
    d.innerHTML='<span class="pulse"></span><span class="sdetail">live — watching for new messages</span>';
    return d;
  }
  if(ev.role==='system'&&ev.kind==='queue-remove'){
    const e=CHAT_ST&&CHAT_ST.queued.get(ev.text);
    if(e&&e.st==='pending'){flipChip(e);e.st='removed';renderStatus()}
    return null;
  }
  return null;
}

/* Task checklist pinned under the chat header, fed by TaskCreate /
   TaskUpdate results and TodoWrite snapshots in the stream. */
function flipChip(e){const c=e.el&&e.el.querySelector('.chip');if(c)c.textContent='⏱ sent mid-turn'}
/* A queued message's delivery echoes back as a mid-turn reminder, a
   next-turn prompt, or a slash command. The first echo after queueing
   is the same message coming around (dedup it); anything after that is
   the user genuinely repeating themselves (render it). */
function markDelivered(text){
  const st=CHAT_ST;if(!st)return false;
  const e=st.queued.get(text);
  if(!e)return false;
  if(e.st==='done'){st.queued.delete(text);return false}
  flipChip(e);e.st='done';renderStatus();
  return true;
}

function updateTasks(ev){
  const st=CHAT_ST;if(!st)return;
  if(ev.kind==='snapshot'){
    // Authoritative on-disk state — other sessions (even on other
    // seats) update it, so it always replaces transcript-derived data.
    st.snap=true;st.tasks=new Map();
    try{JSON.parse(ev.text).forEach(t=>st.tasks.set(t.id,{subject:t.subject,status:t.status}))}catch{}
  }
  else if(ev.kind==='todos'){try{st.todos=JSON.parse(ev.text)}catch{}}
  else if(st.snap)return; // transcript replay can't override the store
  else if(ev.kind==='task-create')st.tasks.set(ev.tool,{subject:ev.text,status:'pending'});
  else if(ev.kind==='task-update'){
    const t=st.tasks.get(ev.tool)||{subject:ev.detail||('task #'+ev.tool),status:'pending'};
    if(ev.text)t.status=ev.text;
    if(ev.detail)t.subject=ev.detail;
    st.tasks.set(ev.tool,t);
  }
  if(st.caughtUp||ev.kind==='snapshot')renderTasks();
}
function renderTasks(){
  const st=CHAT_ST,el=$('ctasks');
  if(!st){el.classList.remove('show');return}
  let items=[...st.tasks.entries()].map(([id,t])=>({id,...t}));
  if(!items.length&&!st.snap&&st.todos)items=st.todos.map((t,i)=>({id:''+(i+1),subject:t.content,status:t.status}));
  if(!items.length){el.classList.remove('show');return}
  const done=items.filter(t=>t.status==='completed').length;
  const mark=s=>s==='completed'?'✓':s==='in_progress'?'◐':'○';
  el.innerHTML='<div class="thead"><span>☑ Tasks</span><span class="prog">'+done+'/'+items.length+' done</span>'
    +'<span class="prog" style="margin-left:auto">▾</span></div>'
    +'<div class="tlist">'+items.map(t=>'<div class="titem '+esc(t.status||'pending')+'">'
      +'<span class="mark">'+mark(t.status)+'</span><span>'+esc(t.subject||'')+'</span></div>').join('')+'</div>';
  el.classList.add('show');
}

/* ---------- actions & polling ---------- */
async function act(action,args,msg){
  toast(msg||'Working…',6000);
  try{const r=await api('/api/action',{method:'POST',body:JSON.stringify({action,args})});
    toast(r.ok?'Done ✓':('cux: '+(r.output||'error').trim().split('\n').pop()),r.ok?1800:4200);
    refresh();
  }catch(e){toast('Failed: '+e.message,4000)}
}

async function refresh(){
  if(!TOK)return;
  try{
    DECK=await api('/api/deck');
    try{CONVS=await api('/api/conversations')||[]}catch{CONVS=[]}
    $('pulse').classList.remove('off');
    if(FIRST||CUR!=='settings')render();
    FIRST=false;
  }catch(e){if(e.message!=='unauthorized')$('pulse').classList.add('off')}
}
skeletons();refresh();setInterval(refresh,4000);
// Live tickers between polls — uptime counts feel alive.
TICK=setInterval(()=>{document.querySelectorAll('[data-tick]').forEach(el=>{
  el.textContent=ago(el.dataset.tick)})},1000);
</script>
